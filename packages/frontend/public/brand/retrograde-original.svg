<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <!-- Neon pink glow -->
    <filter id="neonPink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Neon teal glow -->
    <filter id="neonTeal" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Sun gradient -->
    <linearGradient id="sunGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6ec7"/>
      <stop offset="50%" stop-color="#ff3399"/>
      <stop offset="100%" stop-color="#ff0066"/>
    </linearGradient>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0033"/>
      <stop offset="40%" stop-color="#0d001a"/>
      <stop offset="100%" stop-color="#000011"/>
    </linearGradient>
    <!-- Chrome text gradient -->
    <linearGradient id="chromeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="25%" stop-color="#ff6ec7"/>
      <stop offset="50%" stop-color="#ff1493"/>
      <stop offset="75%" stop-color="#ff6ec7"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <!-- Grid perspective mask -->
    <linearGradient id="gridFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="30%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="white" stop-opacity="1"/>
    </linearGradient>
    <mask id="gridMask">
      <rect x="0" y="280" width="800" height="220" fill="url(#gridFade)"/>
    </mask>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Stars -->
  <g fill="#ffffff" opacity="0.4">
    <circle cx="50" cy="40" r="1.2"/><circle cx="150" cy="80" r="0.8"/>
    <circle cx="250" cy="30" r="1"/><circle cx="380" cy="60" r="0.6"/>
    <circle cx="500" cy="45" r="1.1"/><circle cx="620" cy="70" r="0.9"/>
    <circle cx="700" cy="35" r="1.3"/><circle cx="100" cy="120" r="0.7"/>
    <circle cx="680" cy="110" r="0.8"/><circle cx="450" cy="100" r="1"/>
    <circle cx="320" cy="95" r="0.6"/><circle cx="750" cy="90" r="0.9"/>
  </g>

  <!-- Retro sun -->
  <g>
    <circle cx="400" cy="260" r="90" fill="url(#sunGrad)" opacity="0.9"/>
    <!-- Sun horizontal stripes (cutout effect) -->
    <rect x="310" y="245" width="180" height="4" fill="#1a0033" opacity="0.8"/>
    <rect x="310" y="255" width="180" height="5" fill="#1a0033" opacity="0.8"/>
    <rect x="310" y="267" width="180" height="6" fill="#1a0033" opacity="0.8"/>
    <rect x="310" y="281" width="180" height="8" fill="#1a0033" opacity="0.8"/>
    <rect x="310" y="298" width="180" height="10" fill="#1a0033" opacity="0.8"/>
    <rect x="310" y="318" width="180" height="12" fill="#1a0033" opacity="0.8"/>
  </g>

  <!-- Perspective grid -->
  <g mask="url(#gridMask)" opacity="0.7">
    <!-- Horizontal lines -->
    <line x1="0" y1="320" x2="800" y2="320" stroke="#00e5ff" stroke-width="0.5" filter="url(#neonTeal)"/>
    <line x1="0" y1="340" x2="800" y2="340" stroke="#00e5ff" stroke-width="0.6"/>
    <line x1="0" y1="358" x2="800" y2="358" stroke="#00e5ff" stroke-width="0.7"/>
    <line x1="0" y1="374" x2="800" y2="374" stroke="#00e5ff" stroke-width="0.8"/>
    <line x1="0" y1="390" x2="800" y2="390" stroke="#00e5ff" stroke-width="0.9"/>
    <line x1="0" y1="406" x2="800" y2="406" stroke="#00e5ff" stroke-width="1"/>
    <line x1="0" y1="422" x2="800" y2="422" stroke="#00e5ff" stroke-width="1.1"/>
    <line x1="0" y1="438" x2="800" y2="438" stroke="#00e5ff" stroke-width="1.2"/>
    <line x1="0" y1="454" x2="800" y2="454" stroke="#00e5ff" stroke-width="1.3"/>
    <line x1="0" y1="470" x2="800" y2="470" stroke="#00e5ff" stroke-width="1.4"/>
    <line x1="0" y1="486" x2="800" y2="486" stroke="#00e5ff" stroke-width="1.5"/>
    <!-- Vertical converging lines -->
    <line x1="400" y1="320" x2="0" y2="500" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="400" y1="320" x2="100" y2="500" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="400" y1="320" x2="200" y2="500" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="400" y1="320" x2="300" y2="500" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="400" y1="320" x2="350" y2="500" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="400" y1="320" x2="450" y2="500" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="400" y1="320" x2="500" y2="500" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="400" y1="320" x2="600" y2="500" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="400" y1="320" x2="700" y2="500" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="400" y1="320" x2="800" y2="500" stroke="#00e5ff" stroke-width="0.5"/>
  </g>

  <!-- Horizon glow -->
  <ellipse cx="400" cy="320" rx="400" ry="30" fill="#ff1493" opacity="0.15"/>
  <ellipse cx="400" cy="320" rx="300" ry="15" fill="#00e5ff" opacity="0.1"/>

  <!-- Main title: RETROGRADE -->
  <text x="400" y="210" text-anchor="middle" font-family="'Arial Black', 'Impact', sans-serif" font-size="88" font-weight="900" font-style="italic" fill="url(#chromeGrad)" filter="url(#neonPink)" letter-spacing="6">RETROGRADE</text>

  <!-- Outline stroke for depth -->
  <text x="400" y="210" text-anchor="middle" font-family="'Arial Black', 'Impact', sans-serif" font-size="88" font-weight="900" font-style="italic" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.5" letter-spacing="6">RETROGRADE</text>

  <!-- Decorative lines -->
  <line x1="80" y1="235" x2="320" y2="235" stroke="#ff6ec7" stroke-width="2" filter="url(#neonPink)"/>
  <line x1="480" y1="235" x2="720" y2="235" stroke="#ff6ec7" stroke-width="2" filter="url(#neonPink)"/>

  <!-- Teal accent lines -->
  <line x1="80" y1="240" x2="320" y2="240" stroke="#00e5ff" stroke-width="1" filter="url(#neonTeal)"/>
  <line x1="480" y1="240" x2="720" y2="240" stroke="#00e5ff" stroke-width="1" filter="url(#neonTeal)"/>

  <!-- Small diamond accent -->
  <polygon points="400,230 408,240 400,250 392,240" fill="#00e5ff" filter="url(#neonTeal)"/>

  <!-- Corner accent triangles -->
  <polygon points="20,20 60,20 20,50" fill="none" stroke="#ff6ec7" stroke-width="1.5" opacity="0.5" filter="url(#neonPink)"/>
  <polygon points="780,20 740,20 780,50" fill="none" stroke="#ff6ec7" stroke-width="1.5" opacity="0.5" filter="url(#neonPink)"/>
  <polygon points="20,480 60,480 20,450" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.4" filter="url(#neonTeal)"/>
  <polygon points="780,480 740,480 780,450" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.4" filter="url(#neonTeal)"/>

</svg>