<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" width="700" height="450">
  <defs>
    <!-- Neon pink glow -->
    <filter id="neonPink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Neon teal glow -->
    <filter id="neonTeal" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0015"/>
      <stop offset="50%" stop-color="#120025"/>
      <stop offset="100%" stop-color="#000011"/>
    </linearGradient>
    <!-- Sun gradient -->
    <linearGradient id="sunGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffcc00"/>
      <stop offset="30%" stop-color="#ff6ec7"/>
      <stop offset="70%" stop-color="#ff1493"/>
      <stop offset="100%" stop-color="#cc0066"/>
    </linearGradient>
    <!-- Chrome teal gradient for text -->
    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0fff5"/>
      <stop offset="20%" stop-color="#00e5ff"/>
      <stop offset="45%" stop-color="#00b8cc"/>
      <stop offset="55%" stop-color="#00b8cc"/>
      <stop offset="80%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#b0fff5"/>
    </linearGradient>
    <!-- Teal reflection gradient -->
    <linearGradient id="reflectGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>
    <!-- Grid fade mask -->
    <linearGradient id="gridFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="20%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="1"/>
    </linearGradient>
    <mask id="gridMask">
      <rect x="0" y="260" width="700" height="190" fill="url(#gridFade)"/>
    </mask>
    <!-- Outer glow for text -->
    <filter id="bigGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="450" fill="url(#bgGrad)"/>

  <!-- Stars -->
  <g fill="#ffffff" opacity="0.35">
    <circle cx="45" cy="35" r="1.1"/><circle cx="130" cy="75" r="0.7"/>
    <circle cx="230" cy="25" r="1"/><circle cx="350" cy="55" r="0.5"/>
    <circle cx="470" cy="40" r="1.2"/><circle cx="580" cy="65" r="0.8"/>
    <circle cx="650" cy="30" r="1.3"/><circle cx="90" cy="110" r="0.6"/>
    <circle cx="610" cy="100" r="0.7"/><circle cx="400" cy="90" r="0.9"/>
    <circle cx="280" cy="85" r="0.5"/><circle cx="520" cy="115" r="0.8"/>
    <circle cx="170" cy="50" r="0.9"/><circle cx="660" cy="80" r="0.6"/>
  </g>

  <!-- Retro sun - larger for this version -->
  <g>
    <circle cx="350" cy="245" r="100" fill="url(#sunGrad)" opacity="0.9"/>
    <!-- Sun stripe cutouts -->
    <rect x="250" y="225" width="200" height="4" fill="#120025" opacity="0.85"/>
    <rect x="250" y="236" width="200" height="5" fill="#120025" opacity="0.85"/>
    <rect x="250" y="249" width="200" height="7" fill="#120025" opacity="0.85"/>
    <rect x="250" y="265" width="200" height="9" fill="#120025" opacity="0.85"/>
    <rect x="250" y="284" width="200" height="11" fill="#120025" opacity="0.85"/>
    <rect x="250" y="306" width="200" height="14" fill="#120025" opacity="0.85"/>
  </g>

  <!-- Perspective grid floor -->
  <g mask="url(#gridMask)" opacity="0.65">
    <!-- Horizontal lines -->
    <line x1="0" y1="300" x2="700" y2="300" stroke="#00e5ff" stroke-width="0.6" filter="url(#neonTeal)"/>
    <line x1="0" y1="316" x2="700" y2="316" stroke="#00e5ff" stroke-width="0.7"/>
    <line x1="0" y1="330" x2="700" y2="330" stroke="#00e5ff" stroke-width="0.8"/>
    <line x1="0" y1="344" x2="700" y2="344" stroke="#00e5ff" stroke-width="0.9"/>
    <line x1="0" y1="358" x2="700" y2="358" stroke="#00e5ff" stroke-width="1"/>
    <line x1="0" y1="372" x2="700" y2="372" stroke="#00e5ff" stroke-width="1.1"/>
    <line x1="0" y1="386" x2="700" y2="386" stroke="#00e5ff" stroke-width="1.2"/>
    <line x1="0" y1="400" x2="700" y2="400" stroke="#00e5ff" stroke-width="1.3"/>
    <line x1="0" y1="414" x2="700" y2="414" stroke="#00e5ff" stroke-width="1.4"/>
    <line x1="0" y1="428" x2="700" y2="428" stroke="#00e5ff" stroke-width="1.5"/>
    <line x1="0" y1="442" x2="700" y2="442" stroke="#00e5ff" stroke-width="1.6"/>
    <!-- Vertical converging lines -->
    <line x1="350" y1="300" x2="0" y2="450" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="350" y1="300" x2="88" y2="450" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="350" y1="300" x2="175" y2="450" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="350" y1="300" x2="263" y2="450" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="350" y1="300" x2="315" y2="450" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="350" y1="300" x2="385" y2="450" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="350" y1="300" x2="438" y2="450" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="350" y1="300" x2="525" y2="450" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="350" y1="300" x2="613" y2="450" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="350" y1="300" x2="700" y2="450" stroke="#00e5ff" stroke-width="0.5"/>
  </g>

  <!-- Horizon glow -->
  <ellipse cx="350" cy="300" rx="350" ry="25" fill="#ff1493" opacity="0.12"/>
  <ellipse cx="350" cy="300" rx="250" ry="12" fill="#00e5ff" opacity="0.08"/>

  <!-- Main title: RETRO - big and bold -->
  <!-- Pink outer glow layer -->
  <text x="350" y="200" text-anchor="middle" font-family="'Arial Black', 'Impact', sans-serif" font-size="130" font-weight="900" font-style="italic" fill="#ff1493" opacity="0.4" filter="url(#bigGlow)" letter-spacing="10">RETRO</text>

  <!-- Main text fill -->
  <text x="350" y="200" text-anchor="middle" font-family="'Arial Black', 'Impact', sans-serif" font-size="130" font-weight="900" font-style="italic" fill="url(#textGrad)" filter="url(#neonPink)" letter-spacing="10">RETRO</text>

  <!-- Teal outline for chrome effect -->
  <text x="350" y="200" text-anchor="middle" font-family="'Arial Black', 'Impact', sans-serif" font-size="130" font-weight="900" font-style="italic" fill="none" stroke="#00e5ff" stroke-width="1.2" opacity="0.4" letter-spacing="10">RETRO</text>

  <!-- Reflection text (flipped, faded) -->
  <g opacity="0.15">
    <text x="350" y="200" text-anchor="middle" font-family="'Arial Black', 'Impact', sans-serif" font-size="130" font-weight="900" font-style="italic" fill="url(#reflectGrad)" letter-spacing="10" transform="translate(0, 430) scale(1, -1)">RETRO</text>
  </g>

  <!-- Decorative neon lines -->
  <line x1="55" y1="225" x2="230" y2="225" stroke="#ff6ec7" stroke-width="2.5" filter="url(#neonPink)"/>
  <line x1="470" y1="225" x2="645" y2="225" stroke="#ff6ec7" stroke-width="2.5" filter="url(#neonPink)"/>
  <line x1="55" y1="231" x2="230" y2="231" stroke="#00e5ff" stroke-width="1.2" filter="url(#neonTeal)"/>
  <line x1="470" y1="231" x2="645" y2="231" stroke="#00e5ff" stroke-width="1.2" filter="url(#neonTeal)"/>

  <!-- Center diamond -->
  <polygon points="350,220 360,232 350,244 340,232" fill="#00e5ff" filter="url(#neonTeal)"/>

  <!-- Corner accent triangles -->
  <polygon points="20,20 60,20 20,50" fill="none" stroke="#ff6ec7" stroke-width="1.5" opacity="0.5" filter="url(#neonPink)"/>
  <polygon points="680,20 640,20 680,50" fill="none" stroke="#ff6ec7" stroke-width="1.5" opacity="0.5" filter="url(#neonPink)"/>
  <polygon points="20,430 60,430 20,400" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.4" filter="url(#neonTeal)"/>
  <polygon points="680,430 640,430 680,400" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.4" filter="url(#neonTeal)"/>
</svg>